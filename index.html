<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda Online</title>
    </head>
<body>
    
    <div id="app">Cargando tienda...</div>

    <script>
        // CONFIGURACIÓN: Pega aquí tu URL nueva
        const API_URL = 'https://script.google.com/macros/s/AKfycbyja23l2VVYO8UtVUSUjV52XLc8ftlSfdTJayHkU-r1C0agaJnGgQIY6UEM8lwuVYkCbQ/exec';
        let isAdmin = false; // Ajusta según tu lógica de login

        // ============================================================
        // FUNCIÓN CORREGIDA PARA CONECTAR CON GOOGLE SHEETS
        // ============================================================
        async function loadAllData() {
            try {
                console.log('Conectando a:', API_URL);
                
                // Usamos fetch con modo cors para permitir la comunicación
                const response = await fetch(API_URL + '?action=getProducts', {
                    method: 'GET',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) throw new Error('Error al conectar con la base de datos');

                const result = await response.json();
                
                if (result.success) {
                    console.log('✅ Datos cargados correctamente:', result.data);
                    // Aquí llamamos a la función que renderiza tus productos
                    // renderProducts(result.data); 
                    document.getElementById('app').innerHTML = 'Tienda cargada exitosamente.';
                } else {
                    throw new Error('El servidor respondió con error');
                }
            } catch (error) {
                console.error('❌ Error:', error);
                document.getElementById('app').innerHTML = 'Error de conexión. Revisa la consola (F12).';
            }
        }

        // ============================================================
        // INICIO AUTOMÁTICO
        // ============================================================
        async function init() {
            await loadAllData();
        }
        
        // Ejecutar al cargar la página
        window.onload = init;
    </script>
</body>
</html>
